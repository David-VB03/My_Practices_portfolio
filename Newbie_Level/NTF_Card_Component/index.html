<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="/base.css">
  <link rel="stylesheet" href="second_style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

  <title>Frontend Mentor | NFT preview card component</title>


</head>

<body>

  <main class="card">
    <picture class="img__container">
      <img src="images/image-equilibrium.jpg" alt="An empty font">
      <div class="overlay">
        <img src="images/icon-view.svg" alt="">
      </div>
    </picture>
    <section class="card__content">
      <h1><a href="#">Equilibrium #3429</a></h1>
      <p class="text__content">
        Our Equilibrium collection promotes balance and calm.
      </p>
      <div class="details__information">
        <span class="price__product"><img src="images/icon-ethereum.svg" alt="">0.041 ETH</span>
        <span class="time__product"><img src="images/icon-clock.svg" alt="">3 days left</span>
      </div>
      <hr>
      <div class="author">
        <img src="images/image-avatar.png" alt="A profile of author" width="44" height="44">
        <p class="author__product">Creation of <a href="#">Jules Wyvern</a></p>
      </div>
    </section>
  </main>


</body>

</html>
